<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrations — Analytics Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
  <!-- Chart.js via CDN (no build step) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>Registrations Dashboard</h1>
    <span id="status-pill" class="pill">Loading…</span>
  </header>

  <!-- ===== Global Filters ===== -->
  <section class="filters" id="filters">
    <div class="field">
      <label for="f-from">From</label>
      <input type="date" id="f-from" />
    </div>
    <div class="field">
      <label for="f-to">To</label>
      <input type="date" id="f-to" />
    </div>
    <div class="field">
      <label for="f-district">District</label>
      <select id="f-district"><option value="">All</option></select>
    </div>
    <div class="field">
      <label for="f-gender">Gender</label>
      <select id="f-gender"><option value="">All</option></select>
    </div>
    <div class="field">
      <label for="f-occupation">Occupation</label>
      <select id="f-occupation"><option value="">All</option></select>
    </div>
    <div class="field">
      <label for="f-status">Status</label>
      <select id="f-status"><option value="">All</option></select>
    </div>
    <div class="field">
      <label for="f-groupby">Group by</label>
      <select id="f-groupby">
        <option value="day">Day</option>
        <option value="month">Month</option>
      </select>
    </div>
    <button id="btn-reset" class="btn-reset" type="button">Reset</button>
    <button id="btn-export" class="btn-export" type="button">⬇ Download CSV</button>
  </section>

  <!-- ===== KPI Summary Cards ===== -->
  <section class="kpis">
    <div class="kpi-card">
      <span class="kpi-label">Total Registrations</span>
      <span class="kpi-value" id="kpi-total">—</span>
    </div>
    <div class="kpi-card">
      <span class="kpi-label">Pending</span>
      <span class="kpi-value" id="kpi-pending">—</span>
    </div>
    <div class="kpi-card">
      <span class="kpi-label">Approved</span>
      <span class="kpi-value" id="kpi-approved">—</span>
    </div>
    <div class="kpi-card">
      <span class="kpi-label">Approval Rate</span>
      <span class="kpi-value" id="kpi-rate">—</span>
    </div>
    <div class="kpi-card">
      <span class="kpi-label">Unique Districts</span>
      <span class="kpi-value" id="kpi-districts">—</span>
    </div>
  </section>

  <!-- ===== Charts ===== -->
  <section class="charts">
    <div class="chart-card wide">
      <h3>Registrations Over Time</h3>
      <canvas id="chart-timeseries"></canvas>
    </div>
    <div class="chart-card">
      <h3>By Gender</h3>
      <canvas id="chart-gender"></canvas>
    </div>
    <div class="chart-card">
      <h3>Top Districts</h3>
      <canvas id="chart-district"></canvas>
    </div>
    <div class="chart-card">
      <h3>Top Occupations</h3>
      <canvas id="chart-occupation"></canvas>
    </div>
    <div class="chart-card">
      <h3>By Status</h3>
      <canvas id="chart-status"></canvas>
    </div>
  </section>

  <!-- ===== Raw Data Table ===== -->
  <section class="table-section">
    <h3>Raw Registrations</h3>
    <table class="data-table">
      <thead>
        <tr>
          <th>Reg ID</th>
          <th>Name</th>
          <th>District</th>
          <th>Occupation</th>
          <th>Gender</th>
          <th>Status</th>
          <th>Registered</th>
          <th>Documents</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="8" class="empty">Loading…</td></tr>
      </tbody>
    </table>
    <div class="pagination">
      <button id="btn-prev" type="button">‹ Prev</button>
      <span id="page-info">Page 1</span>
      <button id="btn-next" type="button">Next ›</button>
    </div>
  </section>

  <script src="dashboard.js"></script>
</body>
</html>
